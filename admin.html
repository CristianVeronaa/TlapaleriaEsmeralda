<!DOCTYPE html>
<html lang="es">

<!-- Panel de administración de Tlapalería Esmeralda.
     Incluye acceso de administrador, panel de estadísticas, gestión de productos,
     edición de inventario y administración de pedidos. -->

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Panel de Administración — Tlapalería Esmeralda</title>
  <link rel="icon"
    href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><rect width='100' height='100' rx='18' fill='%231e3a5f'/><path d='M25 72V42l25-16 25 16v30H55V55H45v17H25Z' fill='white'/></svg>" />
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link
    href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;600;700;800&family=Inter:wght@400;500;600&display=swap"
    rel="stylesheet">
  <style>
    :root {
      --bg: #f7f8fb;
      --bg2: #ffffff;
      --bg3: #f0f2f7;
      --border: #e2e6ef;
      --borderl: #d5dbe8;
      --green: #16a34a;
      --greend: #15803d;
      --greenglow: rgba(22, 163, 74, .1);
      --blue: #1e3a5f;
      --bluelight: #2c5282;
      --orange: #ea580c;
      --red: #dc2626;
      --text: #1a202c;
      --textsec: #4a5568;
      --textmut: #8896ab;
      --r: 10px;
      --rl: 14px;
      --t: .24s ease;
    }

    *,
    *::before,
    *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    html {
      scroll-behavior: smooth;
    }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'Inter', sans-serif;
      min-height: 100vh;
    }

    ::-webkit-scrollbar {
      width: 6px;
    }

    ::-webkit-scrollbar-track {
      background: var(--bg);
    }

    ::-webkit-scrollbar-thumb {
      background: var(--borderl);
      border-radius: 99px;
    }

    /* --- LOGIN --- */
    #login-screen {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: linear-gradient(135deg, #f0f4ff 0%, #e8edf5 100%);
    }

    .login-box {
      background: #fff;
      border: 1px solid var(--borderl);
      border-radius: var(--rl);
      padding: 2.5rem 2rem;
      width: 360px;
      text-align: center;
      box-shadow: 0 4px 24px rgba(0, 0, 0, .06);
    }

    .login-icon {
      font-size: 2.5rem;
      margin-bottom: 1rem;
      width: 56px;
      height: 56px;
      background: var(--blue);
      border-radius: 14px;
      display: grid;
      place-items: center;
      margin: 0 auto 1rem;
    }

    .login-icon svg {
      width: 26px;
      height: 26px;
      fill: none;
      stroke: #fff;
      stroke-width: 2;
    }

    .login-box h1 {
      font-family: 'Outfit', sans-serif;
      font-size: 1.4rem;
      font-weight: 800;
      color: var(--blue);
      margin-bottom: .3rem;
    }

    .login-box>p {
      color: var(--textsec);
      font-size: .84rem;
      margin-bottom: 1.8rem;
    }

    .login-box input {
      width: 100%;
      padding: .75rem .95rem;
      background: var(--bg);
      border: 1px solid var(--borderl);
      border-radius: var(--r);
      color: var(--text);
      font-family: 'Inter', sans-serif;
      font-size: .92rem;
      margin-bottom: .9rem;
      transition: border-color var(--t);
    }

    .login-box input:focus {
      outline: none;
      border-color: var(--blue);
    }

    .btn-login {
      width: 100%;
      padding: .8rem;
      background: var(--blue);
      color: #fff;
      border: none;
      border-radius: var(--r);
      font-family: 'Outfit', sans-serif;
      font-size: .95rem;
      font-weight: 700;
      cursor: pointer;
      transition: background var(--t);
    }

    .btn-login:hover {
      background: var(--bluelight);
    }

    .login-hint {
      color: var(--textmut);
      font-size: .74rem;
      margin-top: .9rem;
    }

    /* --- ADMIN LAYOUT --- */
    #admin-app {
      display: none;
      min-height: 100vh;
    }

    header.admin-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 2rem;
      height: 60px;
      background: #fff;
      border-bottom: 1px solid var(--border);
      position: sticky;
      top: 0;
      z-index: 100;
      box-shadow: 0 1px 8px rgba(0, 0, 0, .04);
    }

    .admin-brand {
      display: flex;
      align-items: center;
      gap: .6rem;
      font-family: 'Outfit', sans-serif;
      font-weight: 800;
      font-size: 1.05rem;
      color: var(--blue);
    }

    .admin-brand .brand-dot {
      width: 9px;
      height: 9px;
      background: var(--green);
      border-radius: 50%;
      box-shadow: 0 0 6px var(--green);
    }

    .admin-nav {
      display: flex;
      gap: .6rem;
    }

    .btn-tab {
      background: none;
      border: 1px solid transparent;
      color: var(--textsec);
      padding: .4rem .8rem;
      border-radius: var(--r);
      font-size: .82rem;
      font-weight: 600;
      cursor: pointer;
      transition: all var(--t);
    }

    .btn-tab:hover,
    .btn-tab.active {
      color: var(--blue);
      background: var(--bg3);
      border-color: var(--borderl);
    }

    .btn-tab.active {
      border-color: var(--blue);
      color: var(--blue);
    }

    .admin-actions {
      display: flex;
      gap: .6rem;
      align-items: center;
    }

    .btn-logout {
      background: none;
      border: 1px solid var(--borderl);
      color: var(--textsec);
      padding: .38rem .75rem;
      border-radius: var(--r);
      font-size: .78rem;
      cursor: pointer;
      transition: all var(--t);
      font-family: 'Inter', sans-serif;
    }

    .btn-logout:hover {
      border-color: var(--red);
      color: var(--red);
    }

    .btn-go-store {
      background: var(--bg3);
      border: 1px solid var(--borderl);
      color: var(--text);
      padding: .38rem .75rem;
      border-radius: var(--r);
      font-size: .78rem;
      cursor: pointer;
      transition: all var(--t);
      font-family: 'Inter', sans-serif;
      text-decoration: none;
      display: inline-flex;
      align-items: center;
      gap: .35rem;
    }

    .btn-go-store:hover {
      border-color: var(--blue);
      color: var(--blue);
    }

    main.admin-main {
      padding: 1.8rem 2rem;
      max-width: 1100px;
      margin: 0 auto;
    }

    /* --- TABS CONTENT --- */
    .tab-panel {
      display: none;
    }

    .tab-panel.active {
      display: block;
    }

    /* --- STATS --- */
    .stats-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
      gap: 1rem;
      margin-bottom: 2.2rem;
    }

    .stat-card {
      background: #fff;
      border: 1px solid var(--border);
      border-radius: var(--rl);
      padding: 1.2rem 1.4rem;
      transition: border-color var(--t), box-shadow var(--t);
    }

    .stat-card:hover {
      border-color: var(--blue);
      box-shadow: 0 2px 12px rgba(30, 58, 95, .06);
    }

    .stat-card .stat-label {
      color: var(--textmut);
      font-size: .72rem;
      text-transform: uppercase;
      letter-spacing: .6px;
      margin-bottom: .4rem;
    }

    .stat-card .stat-value {
      font-family: 'Outfit', sans-serif;
      font-size: 1.8rem;
      font-weight: 800;
      color: var(--blue);
    }

    .stat-card .stat-desc {
      color: var(--textsec);
      font-size: .72rem;
      margin-top: .2rem;
    }

    /* --- PRODUCT TABLE --- */
    .table-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 1.1rem;
    }

    .table-header h2 {
      font-family: 'Outfit', sans-serif;
      font-size: 1.1rem;
      font-weight: 700;
      color: var(--blue);
    }

    .btn-add-product {
      background: var(--blue);
      color: #fff;
      border: none;
      padding: .55rem 1.1rem;
      border-radius: var(--r);
      font-family: 'Outfit', sans-serif;
      font-size: .84rem;
      font-weight: 700;
      cursor: pointer;
      transition: background var(--t);
    }

    .btn-add-product:hover {
      background: var(--bluelight);
    }

    .products-table-wrap,
    .orders-table-wrap {
      overflow-x: auto;
      border-radius: var(--rl);
      border: 1px solid var(--border);
      box-shadow: 0 1px 6px rgba(0, 0, 0, .03);
    }

    table {
      width: 100%;
      border-collapse: collapse;
      background: #fff;
      min-width: 640px;
    }

    .orders-table-wrap table {
      min-width: 780px;
    }

    thead {
      background: var(--bg3);
    }

    th,
    td {
      padding: .8rem 1rem;
      text-align: left;
      border-bottom: 1px solid var(--border);
      font-size: .84rem;
    }

    th {
      color: var(--textmut);
      font-weight: 600;
      text-transform: uppercase;
      font-size: .7rem;
      letter-spacing: .6px;
    }

    td {
      color: var(--textsec);
    }

    tbody tr {
      transition: background var(--t);
    }

    tbody tr:hover {
      background: var(--bg3);
    }

    tbody tr:last-child td {
      border-bottom: none;
    }

    .td-img {
      width: 44px;
      height: 44px;
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: 7px;
      object-fit: contain;
      padding: 3px;
    }

    .td-name {
      color: var(--text);
      font-weight: 600;
    }

    .badge-cat {
      display: inline-block;
      background: rgba(30, 58, 95, .08);
      color: var(--blue);
      border: 1px solid rgba(30, 58, 95, .15);
      font-size: .68rem;
      font-weight: 700;
      padding: .18rem .5rem;
      border-radius: 5px;
      text-transform: uppercase;
      letter-spacing: .4px;
    }

    .btn-edit,
    .btn-del {
      padding: .3rem .6rem;
      border-radius: 6px;
      font-size: .75rem;
      font-weight: 600;
      cursor: pointer;
      transition: all var(--t);
    }

    .btn-edit {
      background: var(--bg3);
      border: 1px solid var(--borderl);
      color: var(--textsec);
    }

    .btn-edit:hover {
      border-color: var(--blue);
      color: var(--blue);
    }

    .btn-del {
      background: none;
      border: 1px solid var(--borderl);
      color: var(--textsec);
      margin-left: .3rem;
    }

    .btn-del:hover {
      border-color: var(--red);
      color: var(--red);
      background: rgba(220, 38, 38, .05);
    }

    /* --- FORM --- */
    .form-section h2 {
      font-family: 'Outfit', sans-serif;
      font-size: 1.1rem;
      font-weight: 700;
      margin-bottom: 1.3rem;
      color: var(--blue);
    }

    .product-form {
      background: #fff;
      border: 1px solid var(--border);
      border-radius: var(--rl);
      padding: 1.8rem;
      box-shadow: 0 1px 6px rgba(0, 0, 0, .03);
    }

    .form-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 1rem;
    }

    .form-group {
      display: flex;
      flex-direction: column;
      gap: .4rem;
    }

    .form-group.full {
      grid-column: 1 / -1;
    }

    .form-group label {
      font-size: .74rem;
      font-weight: 600;
      color: var(--textmut);
      text-transform: uppercase;
      letter-spacing: .6px;
    }

    .form-group input,
    .form-group select,
    .form-group textarea {
      background: var(--bg);
      border: 1px solid var(--borderl);
      color: var(--text);
      padding: .65rem .9rem;
      border-radius: var(--r);
      font-family: 'Inter', sans-serif;
      font-size: .88rem;
      transition: border-color var(--t);
    }

    .form-group input:focus,
    .form-group select:focus,
    .form-group textarea:focus {
      outline: none;
      border-color: var(--blue);
    }

    .form-group textarea {
      resize: vertical;
      min-height: 85px;
    }

    .form-actions {
      display: flex;
      gap: .7rem;
      margin-top: 1.3rem;
    }

    .btn-save {
      padding: .7rem 1.4rem;
      background: var(--blue);
      color: #fff;
      border: none;
      border-radius: var(--r);
      font-family: 'Outfit', sans-serif;
      font-size: .9rem;
      font-weight: 700;
      cursor: pointer;
      transition: background var(--t);
    }

    .btn-save:hover {
      background: var(--bluelight);
    }

    .btn-cancel-form {
      padding: .7rem 1.1rem;
      background: var(--bg3);
      border: 1px solid var(--borderl);
      color: var(--textsec);
      border-radius: var(--r);
      font-size: .9rem;
      font-weight: 600;
      cursor: pointer;
      transition: all var(--t);
    }

    .btn-cancel-form:hover {
      border-color: var(--red);
      color: var(--red);
    }

    /* --- ORDERS (PEDIDOS) --- */
    .badge-status {
      display: inline-flex;
      align-items: center;
      gap: .25rem;
      font-size: .68rem;
      font-weight: 700;
      padding: .18rem .55rem;
      border-radius: 5px;
      text-transform: uppercase;
      letter-spacing: .4px;
    }

    .badge-pendiente {
      background: rgba(234, 88, 12, .08);
      color: var(--orange);
      border: 1px solid rgba(234, 88, 12, .2);
    }

    .badge-procesando {
      background: rgba(37, 99, 235, .08);
      color: #2563eb;
      border: 1px solid rgba(37, 99, 235, .2);
    }

    .badge-completado {
      background: rgba(22, 163, 74, .08);
      color: var(--green);
      border: 1px solid rgba(22, 163, 74, .2);
    }

    .badge-cancelado {
      background: rgba(220, 38, 38, .06);
      color: var(--red);
      border: 1px solid rgba(220, 38, 38, .15);
    }

    .btn-status {
      padding: .22rem .48rem;
      border-radius: 5px;
      font-size: .7rem;
      font-weight: 600;
      cursor: pointer;
      transition: all var(--t);
      border: 1px solid var(--borderl);
      background: none;
      color: var(--textsec);
      font-family: 'Inter', sans-serif;
      margin-right: .2rem;
    }

    .btn-status:hover {
      border-color: var(--blue);
      color: var(--blue);
      background: rgba(30, 58, 95, .04);
    }

    .btn-status.danger:hover {
      border-color: var(--red);
      color: var(--red);
      background: rgba(220, 38, 38, .04);
    }

    .order-detail-toggle {
      background: none;
      border: 1px solid var(--borderl);
      color: var(--textsec);
      padding: .25rem .55rem;
      border-radius: 5px;
      font-size: .72rem;
      cursor: pointer;
      transition: all var(--t);
      font-family: 'Inter', sans-serif;
    }

    .order-detail-toggle:hover {
      border-color: var(--blue);
      color: var(--blue);
    }

    .order-detail-row {
      display: none;
    }

    .order-detail-row.visible {
      display: table-row;
    }

    .order-detail-cell {
      padding: 1rem 1.4rem !important;
      background: var(--bg);
    }

    .order-detail-inner {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 1rem;
    }

    .order-detail-col h4 {
      font-size: .72rem;
      color: var(--textmut);
      text-transform: uppercase;
      letter-spacing: .5px;
      margin-bottom: .45rem;
    }

    .order-detail-col p {
      font-size: .82rem;
      color: var(--textsec);
      margin-bottom: .2rem;
    }

    .order-detail-col p strong {
      color: var(--text);
    }

    .order-products-list {
      margin-top: .3rem;
    }

    .order-products-list .op-item {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: .25rem 0;
      font-size: .8rem;
      color: var(--textsec);
      border-bottom: 1px solid var(--border);
    }

    .order-products-list .op-item:last-child {
      border-bottom: none;
    }

    .op-item span:last-child {
      font-weight: 600;
      color: var(--text);
    }

    .empty-orders {
      text-align: center;
      padding: 3rem 1.5rem;
      color: var(--textmut);
    }

    .empty-orders p {
      font-size: .88rem;
    }

    /* --- TOAST --- */
    .toast-container {
      position: fixed;
      bottom: 1.5rem;
      right: 1.5rem;
      z-index: 9999;
      display: flex;
      flex-direction: column;
      gap: .4rem;
    }

    .toast {
      background: #fff;
      border: 1px solid var(--border);
      border-left: 3px solid var(--blue);
      color: var(--text);
      padding: .7rem 1.1rem;
      border-radius: var(--r);
      font-size: .84rem;
      font-weight: 500;
      box-shadow: 0 4px 16px rgba(0, 0, 0, .08);
      animation: slip .28s ease, fo .34s ease 2.3s forwards;
    }

    @keyframes slip {
      from {
        opacity: 0;
        transform: translateX(22px);
      }

      to {
        opacity: 1;
        transform: translateX(0);
      }
    }

    @keyframes fo {
      from {
        opacity: 1;
      }

      to {
        opacity: 0;
      }
    }

    @media (max-width: 700px) {
      .form-grid {
        grid-template-columns: 1fr;
      }

      .admin-nav {
        display: none;
      }

      .order-detail-inner {
        grid-template-columns: 1fr;
      }
    }
  </style>
</head>

<body>

  <!-- LOGIN -->
  <!-- Pantalla de acceso privado para el administrador.
       Valida usuario y contraseña antes de mostrar el panel. -->
  <div id="login-screen">
    <div class="login-box">
      <div class="login-icon">
        <svg viewBox="0 0 24 24">
          <rect x="3" y="11" width="18" height="11" rx="2" ry="2" />
          <path d="M7 11V7a5 5 0 0 1 10 0v4" />
        </svg>
      </div>
      <h1>Panel Administrador</h1>
      <p>Tlapalería Esmeralda — Acceso privado</p>
      <input type="text" id="login-user" placeholder="Usuario" autocomplete="username" />
      <input type="password" id="login-pass" placeholder="Contraseña" autocomplete="current-password" />
      <button class="btn-login" id="btn-login">Iniciar sesión</button>
      <p class="login-hint" <strong>/strong> / <strong></strong></p>
    </div>
  </div>

  <!-- ADMIN APP -->
  <!-- Contenedor principal del panel de administración.
       Se muestra sólo después de iniciar sesión correctamente. -->
  <div id="admin-app">
    <header class="admin-header">
      <div class="admin-brand">
        <div class="brand-dot"></div>
        Esmeralda Admin
      </div>
      <nav class="admin-nav">
        <button class="btn-tab active" data-tab="dashboard">Dashboard</button>
        <button class="btn-tab" data-tab="pedidos">Pedidos</button>
        <button class="btn-tab" data-tab="productos">Inventario</button>
        <button class="btn-tab" data-tab="agregar">Agregar</button>
      </nav>
      <div class="admin-actions">
        <a href="index.html" class="btn-go-store">Ver Tienda</a>
        <button class="btn-logout" id="btn-logout">Salir</button>
      </div>
    </header>

    <main class="admin-main">

      <!-- Dashboard -->
      <div class="tab-panel active" id="tab-dashboard">
        <div class="stats-grid" id="stats-grid"></div>
        <div class="table-header">
          <h2>Inventario reciente</h2>
          <button class="btn-add-product" onclick="openTab('agregar')">Añadir producto</button>
        </div>
        <div class="products-table-wrap" id="dash-table"></div>
      </div>

      <!-- Pedidos -->
      <div class="tab-panel" id="tab-pedidos">
        <div class="table-header">
          <h2>Pedidos de clientes</h2>
        </div>
        <div class="orders-table-wrap" id="orders-table"></div>
      </div>

      <!-- Inventario -->
      <div class="tab-panel" id="tab-productos">
        <div class="table-header">
          <h2>Todos los productos</h2>
          <button class="btn-add-product" onclick="openTab('agregar')">Añadir producto</button>
        </div>
        <div class="products-table-wrap" id="full-table"></div>
      </div>

      <!-- Agregar / Editar -->
      <div class="tab-panel" id="tab-agregar">
        <div class="form-section">
          <h2 id="form-title">Agregar Producto</h2>
          <form class="product-form" id="product-form">
            <input type="hidden" id="f-id" />
            <div class="form-grid">
              <div class="form-group">
                <label>Nombre del producto</label>
                <input type="text" id="f-nombre" placeholder="Ej: Taladro Percutor 850W" required />
              </div>
              <div class="form-group">
                <label>Marca</label>
                <input type="text" id="f-marca" placeholder="Ej: Bosch, Dewalt…" required />
              </div>
              <div class="form-group">
                <label>Precio (MXN)</label>
                <input type="number" id="f-precio" placeholder="0.00" min="0" step="0.01" required />
              </div>
              <div class="form-group">
                <label>Stock</label>
                <input type="number" id="f-stock" placeholder="0" min="0" required />
              </div>
              <div class="form-group">
                <label>Categoría</label>
                <select id="f-categoria">
                  <option value="construccion">Construcción</option>
                  <option value="electricidad">Electricidad</option>
                  <option value="fontaneria">Fontanería</option>
                  <option value="otros">Otros</option>
                </select>
              </div>
              <div class="form-group">
                <label>URL de imagen</label>
                <input type="text" id="f-imagen" placeholder="img/producto.png o https://…" />
              </div>
              <div class="form-group full">
                <label>Descripción técnica</label>
                <textarea id="f-desc" placeholder="Potencia, especificaciones, incluye…" required></textarea>
              </div>
            </div>
            <div class="form-actions">
              <button type="submit" class="btn-save" id="btn-save-product">Guardar producto</button>
              <button type="button" class="btn-cancel-form" id="btn-cancel-form">Cancelar</button>
            </div>
          </form>
        </div>
      </div>

    </main>
  </div>

  <!-- TOASTS -->
  <div class="toast-container" id="toast-container"></div>

  <!-- Carga la base de datos simulada antes del controlador del panel -->
  <script src="js/db.js"></script>
  <script>
    /* --- CONSTANTES --- */
    const ADMIN_USER = 'admin';
    const ADMIN_PASS = 'esmeralda123';

    /* --- LOGIN --- */
    document.getElementById('btn-login').addEventListener('click', () => {
      const u = document.getElementById('login-user').value.trim();
      const p = document.getElementById('login-pass').value.trim();
      if (u === ADMIN_USER && p === ADMIN_PASS) {
        document.getElementById('login-screen').style.display = 'none';
        document.getElementById('admin-app').style.display = 'block';
        DB.init();
        renderDashboard();
        renderTable('full-table');
      } else {
        toast('Usuario o contraseña incorrectos');
      }
    });
    document.getElementById('login-pass').addEventListener('keydown', e => {
      if (e.key === 'Enter') document.getElementById('btn-login').click();
    });

    document.getElementById('btn-logout').addEventListener('click', () => {
      document.getElementById('admin-app').style.display = 'none';
      document.getElementById('login-screen').style.display = 'flex';
    });

    /* --- TABS --- */
    function openTab(name) {
      document.querySelectorAll('.tab-panel').forEach(p => p.classList.remove('active'));
      document.querySelectorAll('.btn-tab').forEach(b => b.classList.remove('active'));
      document.getElementById(`tab-${name}`).classList.add('active');
      document.querySelector(`[data-tab="${name}"]`).classList.add('active');
      if (name === 'dashboard') { renderDashboard(); }
      if (name === 'productos') { renderTable('full-table'); }
      if (name === 'pedidos') { renderOrders(); }
    }
    document.querySelectorAll('.btn-tab').forEach(btn => {
      btn.addEventListener('click', () => openTab(btn.dataset.tab));
    });

    /* --- DASHBOARD STATS --- */
    function renderDashboard() {
      const todos = DB.getAll();
      const totalStock = todos.reduce((s, p) => s + p.stock, 0);
      const valorInv = todos.reduce((s, p) => s + p.precio * p.stock, 0);
      const os = Orders.stats();

      document.getElementById('stats-grid').innerHTML = `
        <div class="stat-card"><div class="stat-label">Total Productos</div><div class="stat-value">${todos.length}</div><div class="stat-desc">en catálogo activo</div></div>
        <div class="stat-card"><div class="stat-label">Total en Stock</div><div class="stat-value">${totalStock}</div><div class="stat-desc">unidades disponibles</div></div>
        <div class="stat-card"><div class="stat-label">Valor Inventario</div><div class="stat-value">$${valorInv.toLocaleString('es-MX')}</div><div class="stat-desc">MXN estimados</div></div>
        <div class="stat-card"><div class="stat-label">Pedidos</div><div class="stat-value" style="color:#2563eb">${os.total}</div><div class="stat-desc">${os.pendientes} pendiente${os.pendientes !== 1 ? 's' : ''}</div></div>
        <div class="stat-card"><div class="stat-label">Ingresos</div><div class="stat-value" style="color:var(--green)">$${os.ingresos.toLocaleString('es-MX')}</div><div class="stat-desc">MXN (no cancelados)</div></div>
        <div class="stat-card"><div class="stat-label">Stock Bajo</div><div class="stat-value" style="color:var(--orange)">${todos.filter(p => p.stock <= 3).length}</div><div class="stat-desc">productos con ≤3 uds</div></div>
      `;
      renderTable('dash-table', true);
    }

    /* --- PRODUCTS TABLE --- */
    function renderTable(targetId, limitRows = false) {
      let productos = DB.getAll();
      if (limitRows) productos = productos.slice(0, 5);
      const fallbackImg = `data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' width='44' height='44' viewBox='0 0 24 24' fill='none' stroke='%238896ab' stroke-width='1.5'><path d='M21 16V8a2 2 0 0 0-1-1.73l-7-4a2 2 0 0 0-2 0l-7 4A2 2 0 0 0 3 8v8a2 2 0 0 0 1 1.73l7 4a2 2 0 0 0 2 0l7-4A2 2 0 0 0 21 16z'/></svg>`;
      const tbody = productos.map(p => `
        <tr>
          <td><img class="td-img" src="${p.imagen || ''}" alt="${p.nombre}" onerror="this.src='${fallbackImg}'" /></td>
          <td class="td-name">${p.nombre}</td>
          <td>${p.marca}</td>
          <td><span class="badge-cat">${p.categoria}</span></td>
          <td>$${p.precio.toLocaleString('es-MX')}</td>
          <td style="color:${p.stock === 0 ? 'var(--red)' : p.stock <= 3 ? 'var(--orange)' : 'var(--green)'}; font-weight:600;">${p.stock}</td>
          <td>
            <button class="btn-edit" onclick="editProduct(${p.id})">Editar</button>
            <button class="btn-del" onclick="deleteProduct(${p.id})">Eliminar</button>
          </td>
        </tr>
      `).join('');

      document.getElementById(targetId).innerHTML = `
        <table>
          <thead>
            <tr>
              <th>Imagen</th><th>Nombre</th><th>Marca</th><th>Categoría</th>
              <th>Precio</th><th>Stock</th><th>Acciones</th>
            </tr>
          </thead>
          <tbody>${tbody}</tbody>
        </table>
      `;
    }

    /* --- ORDERS TABLE --- */
    function renderOrders() {
      const pedidos = Orders.getAll();
      const container = document.getElementById('orders-table');

      if (pedidos.length === 0) {
        container.innerHTML = `
          <div class="empty-orders">
            <p>No hay pedidos registrados aún.</p>
            <p style="font-size:.78rem; margin-top:.3rem; color:var(--textmut);">
              Los pedidos aparecerán aquí cuando los clientes compren desde la tienda.
            </p>
          </div>`;
        return;
      }

      const rows = pedidos.map((o, idx) => {
        const fecha = new Date(o.fecha);
        const fechaStr = fecha.toLocaleDateString('es-MX', { day: '2-digit', month: 'short', year: 'numeric' });
        const horaStr = fecha.toLocaleTimeString('es-MX', { hour: '2-digit', minute: '2-digit' });

        const productsListHTML = o.productos.map(p =>
          `<div class="op-item"><span>${p.nombre} × ${p.cantidad}</span><span>$${p.subtotal.toLocaleString('es-MX')}</span></div>`
        ).join('');

        let actionsHTML = '';
        if (o.estado === 'pendiente') {
          actionsHTML = `
            <button class="btn-status" onclick="changeOrderStatus('${o.numero}','procesando')">Procesar</button>
            <button class="btn-status danger" onclick="changeOrderStatus('${o.numero}','cancelado')">Cancelar</button>`;
        } else if (o.estado === 'procesando') {
          actionsHTML = `
            <button class="btn-status" onclick="changeOrderStatus('${o.numero}','completado')">Completar</button>
            <button class="btn-status danger" onclick="changeOrderStatus('${o.numero}','cancelado')">Cancelar</button>`;
        } else {
          actionsHTML = `<button class="btn-status danger" onclick="deleteOrder('${o.numero}')">Eliminar</button>`;
        }

        return `
          <tr>
            <td style="font-weight:700; color:var(--blue); font-size:.8rem; letter-spacing:.3px;">${o.numero}</td>
            <td>${fechaStr}<br><span style="font-size:.7rem; color:var(--textmut);">${horaStr}</span></td>
            <td class="td-name">${o.cliente.nombre}</td>
            <td style="font-weight:600;">$${o.total.toLocaleString('es-MX')}</td>
            <td><span class="badge-status badge-${o.estado}">${o.estado}</span></td>
            <td>${actionsHTML}</td>
            <td><button class="order-detail-toggle" onclick="toggleOrderDetail(${idx})">Ver detalle</button></td>
          </tr>
          <tr class="order-detail-row" id="order-detail-${idx}">
            <td class="order-detail-cell" colspan="7">
              <div class="order-detail-inner">
                <div class="order-detail-col">
                  <h4>Datos del cliente</h4>
                  <p><strong>${o.cliente.nombre}</strong></p>
                  <p>Tel: ${o.cliente.telefono}</p>
                  <p>Email: ${o.cliente.email}</p>
                  <p style="margin-top:.35rem;">Envío: <strong>${o.direccion}</strong></p>
                </div>
                <div class="order-detail-col">
                  <h4>Productos del pedido</h4>
                  <div class="order-products-list">${productsListHTML}</div>
                  <p style="margin-top:.45rem; font-weight:700; color:var(--blue);">Total: $${o.total.toLocaleString('es-MX')} MXN</p>
                </div>
              </div>
            </td>
          </tr>
        `;
      }).join('');

      container.innerHTML = `
        <table>
          <thead>
            <tr>
              <th>No. Pedido</th><th>Fecha</th><th>Cliente</th><th>Total</th>
              <th>Estado</th><th>Acciones</th><th></th>
            </tr>
          </thead>
          <tbody>${rows}</tbody>
        </table>
      `;
    }

    function toggleOrderDetail(idx) {
      document.getElementById(`order-detail-${idx}`).classList.toggle('visible');
    }

    function changeOrderStatus(orderNum, newStatus) {
      Orders.updateStatus(orderNum, newStatus);
      renderOrders();
      renderDashboard();
      const labels = { procesando: 'Pedido en proceso', completado: 'Pedido completado', cancelado: 'Pedido cancelado' };
      toast(`${labels[newStatus] || 'Estado actualizado'}: ${orderNum}`);
    }

    function deleteOrder(orderNum) {
      if (!confirm('¿Eliminar este pedido del historial?')) return;
      Orders.delete(orderNum);
      renderOrders();
      renderDashboard();
      toast('Pedido eliminado del historial');
    }

    /* --- EDIT PRODUCT --- */
    function editProduct(id) {
      const p = DB.getById(id);
      if (!p) return;
      document.getElementById('f-id').value = p.id;
      document.getElementById('f-nombre').value = p.nombre;
      document.getElementById('f-marca').value = p.marca;
      document.getElementById('f-precio').value = p.precio;
      document.getElementById('f-stock').value = p.stock;
      document.getElementById('f-categoria').value = p.categoria;
      document.getElementById('f-imagen').value = p.imagen;
      document.getElementById('f-desc').value = p.descripcion;
      document.getElementById('form-title').textContent = 'Editar Producto';
      document.getElementById('btn-save-product').textContent = 'Guardar cambios';
      openTab('agregar');
    }

    function deleteProduct(id) {
      if (!confirm('¿Eliminar este producto del inventario?')) return;
      DB.delete(id);
      renderDashboard();
      renderTable('full-table');
      toast('Producto eliminado');
    }

    /* --- FORM SUBMIT --- */
    document.getElementById('product-form').addEventListener('submit', (e) => {
      e.preventDefault();
      const id = document.getElementById('f-id').value;
      const fallbackImg = `data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' width='80' height='80' viewBox='0 0 24 24' fill='none' stroke='%238896ab' stroke-width='1.5'><path d='M21 16V8a2 2 0 0 0-1-1.73l-7-4a2 2 0 0 0-2 0l-7 4A2 2 0 0 0 3 8v8a2 2 0 0 0 1 1.73l7 4a2 2 0 0 0 2 0l7-4A2 2 0 0 0 21 16z'/></svg>`;
      const data = {
        nombre: document.getElementById('f-nombre').value.trim(),
        marca: document.getElementById('f-marca').value.trim(),
        precio: parseFloat(document.getElementById('f-precio').value),
        stock: parseInt(document.getElementById('f-stock').value),
        categoria: document.getElementById('f-categoria').value,
        imagen: document.getElementById('f-imagen').value.trim() || fallbackImg,
        descripcion: document.getElementById('f-desc').value.trim(),
      };

      if (id) {
        DB.update(id, data);
        toast('Producto actualizado correctamente');
      } else {
        DB.add(data);
        toast('Producto agregado al inventario');
      }

      resetForm();
      renderDashboard();
      renderTable('full-table');
      openTab('productos');
    });

    function resetForm() {
      document.getElementById('f-id').value = '';
      document.getElementById('product-form').reset();
      document.getElementById('form-title').textContent = 'Agregar Producto';
      document.getElementById('btn-save-product').textContent = 'Guardar producto';
    }

    document.getElementById('btn-cancel-form').addEventListener('click', () => {
      resetForm();
      openTab('productos');
    });

    /* --- TOAST --- */
    function toast(msg) {
      const c = document.getElementById('toast-container');
      const t = document.createElement('div');
      t.className = 'toast';
      t.textContent = msg;
      c.appendChild(t);
      setTimeout(() => t.remove(), 2800);
    }
  </script>
</body>

</html>
